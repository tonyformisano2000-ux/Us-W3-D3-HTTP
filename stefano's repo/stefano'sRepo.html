<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather APP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="text-center mt-3">
      <h1>Belvedere di Spinello</h1>
      <h3>Ridente località dei vitelli e degli ulivi</h3>
    </header>
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6">
            <img
              src="https://sigecweb.beniculturali.it/images/fullsize/ICCD1070483/ICCD16438834_Facciata%20Santuario%20Madonna%20della%20Scala.jpg"
              alt="Duomo di Belvedere"
              class="img-fluid"
            />
            <section class="mt-3 d-flex justify-content-between fs-3">
              <div>MIN: <span id="min">20</span>°C</div>
              <div>NOW: <span id="current">20</span>°C</div>
              <div>MAX: <span id="max">20</span>°C</div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./weather-app.js"></script>
  </body>
</html>
